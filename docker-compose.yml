x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    target: final
  env_file:
    - .env
  volumes:
    - ./backend:/app
    - static_volume:/app/staticfiles
    - media_volume:/app/media
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - amanapos_net
  restart: unless-stopped

services:
  # ─── Application ────────────────────────────────────────────────────────────
  app:
    <<: *app-common
    container_name: amanapos_app
    command: gunicorn
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    <<: *app-common
    container_name: amanapos_celery_worker
    command: celery -A config.celery worker --loglevel=info --concurrency=4 -Q default,notifications,reports
    healthcheck:
      test: ["CMD", "celery", "-A", "config.celery", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Celery Beat ───────────────────────────────────────────────────────────
  celery_beat:
    <<: *app-common
    container_name: amanapos_celery_beat
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - app
      - postgres
      - redis

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: amanapos_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-amanapos}
      POSTGRES_USER: ${DB_USER:-amanapos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-amanapos_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - amanapos_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-amanapos} -d ${DB_NAME:-amanapos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: amanapos_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - amanapos_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  # ─── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: amanapos_minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - amanapos_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"

  # ─── MinIO Init (create buckets) ─────────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: amanapos_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - amanapos_net
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${AWS_ACCESS_KEY_ID:-minioadmin} $${AWS_SECRET_ACCESS_KEY:-minioadmin};
      mc mb --ignore-existing myminio/$${AWS_S3_PUBLIC_BUCKET_NAME:-amanapos-public};
      mc mb --ignore-existing myminio/$${AWS_S3_PRIVATE_BUCKET_NAME:-amanapos-private};
      mc mb --ignore-existing myminio/$${AWS_STORAGE_BUCKET_NAME:-amanapos-media};
      mc anonymous set public myminio/$${AWS_S3_PUBLIC_BUCKET_NAME:-amanapos-public};
      echo 'MinIO buckets initialized';
      "
    env_file:
      - .env
    restart: "no"

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: amanapos_nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - app
    networks:
      - amanapos_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# ─── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────────────────
networks:
  amanapos_net:
    driver: bridge
