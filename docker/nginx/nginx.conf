user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ─── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ─── Rate Limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=otp_limit:10m rate=5r/m;
    limit_req_status 429;

    # ─── Upstream ─────────────────────────────────────────────────────────────
    # Use Docker's internal DNS resolver so nginx re-resolves 'app' after
    # container restarts instead of caching the old IP at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream django_app {
        server app:8000 fail_timeout=0;
        keepalive 32;
    }

    # ─── HTTP → HTTPS redirect (uncomment in production with SSL) ─────────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ─── Main Server Block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        charset utf-8;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Static files ──────────────────────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Media files ───────────────────────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── Public API — no token, OTP rate limiting ──────────────────────────
        location /api-public/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://django_app;
            include /etc/nginx/proxy_params;
        }

        # ── Private API — token required, standard rate limiting ──────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://django_app;
            include /etc/nginx/proxy_params;
        }

        # ── Django Admin ──────────────────────────────────────────────────────
        location /admin/ {
            allow 127.0.0.1;
            proxy_pass http://django_app;
            include /etc/nginx/proxy_params;
        }

        # ── Catch-all ─────────────────────────────────────────────────────────
        location / {
            proxy_pass http://django_app;
            include /etc/nginx/proxy_params;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ─── HTTPS Server Block (uncomment and configure for production) ───────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/ssl/certs/your-cert.crt;
    #     ssl_certificate_key /etc/ssl/private/your-key.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # ... same location blocks as above ...
    # }
}
